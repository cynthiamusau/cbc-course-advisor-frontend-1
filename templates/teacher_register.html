{% extends "base.html" %}

{% block title %}Teacher Registration - CBC Course Advisor{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
  <div class="card animate-fade-in" style="padding: 3rem 2rem;">
    <div class="text-center mb-4">
      <div style="font-size: 3rem; margin-bottom: 1rem;">👩‍🏫</div>
      <h2>Register Teacher</h2>
      <p class="mt-2 text-muted">Create a new educator account</p>
    </div>
    
    {% if error %}
    <div class="badge badge-danger" style="display: block; text-align: center; margin-bottom: 1.5rem; padding: 0.75rem;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/teacher/register">
       <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="e.g., Cynthia" required>
       </div>
       
       <div class="form-group mb-4">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
       </div>
       
       <button type="submit" class="btn btn-primary" style="width: 100%;">
          Register Account
       </button>
    </form>
    
    <div class="text-center" style="margin-top: 2rem; border-top: 1px solid #E2E8F0; padding-top: 1.5rem;">
       <p style="font-size: 0.875rem; color: var(--text-muted);">
          Already have an account? <a href="/teacher/login" style="color: var(--primary); font-weight: 500;">Sign in here</a>
       </p>
    </div>
  </div>
</div>
{% endblock %}
