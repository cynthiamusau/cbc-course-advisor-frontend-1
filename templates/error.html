{% extends "base.html" %}

{% block title %}Error - CBC Course Advisor{% endblock %}

{% block content %}
<div class="card text-center py-8 animate-fade-in" style="max-width: 600px; margin: 4rem auto; border-top: 4px solid var(--danger);">
  <div style="font-size: 3.5rem; margin-bottom: 1rem;">⚠️</div>
  <h2 style="color: var(--danger); margin-bottom: 1rem;">Oops! Something went wrong</h2>
  <p class="text-muted mb-6" style="font-size: 1.125rem;">{{ message }}</p>
  <a href="/" class="btn btn-secondary">Return to Home</a>
</div>
{% endblock %}
